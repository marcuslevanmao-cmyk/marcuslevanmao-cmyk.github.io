<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Utility of Gods - Google Docs</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 32'><path d='M16 0H3a2 2 0 0 0-2 2v28a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8z' fill='%23267CDE'/><path d='M16 0/6a2 2 0 0 0 2 2h5z' fill='%237BAAF7'/><rect x='6' y='14' width='12' height='2' fill='%23fff'/><rect x='6' y='19' width='12' height='2' fill='%23fff'/><rect x='6' y='24' width='8' height='2' fill='%23fff'/></svg>" />

  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/comments.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-top">
        <div class="doc-icon" id="header-doc-icon"></div>
        <div class="title-block">
          <div class="title-row">
            <input type="text" class="doc-title" value="The Utility of Gods" />
            <button class="star-btn" title="Star">★</button>
          </div>
          <nav class="menubar">
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Insert</span>
            <span>Format</span>
            <span>Tools</span>
            <span>Extensions</span>
            <span>Help</span>
          </nav>
        </div>
        <div class="header-right">
          <button class="history-trigger-btn" id="history-trigger-btn" style="padding: 6px 12px; margin-right: 12px; background: #e8f0fe; color: #1a73e8; border: none; border-radius: 4px; cursor: pointer; font-weight: 500;">Version History</button>
          <div class="user-avatar" style="background: #0f9d58;">M</div>
        </div>
      </div>

      <div class="toolbar" id="main-toolbar">
        <button class="toolbar-btn" data-action="undo" title="Undo">↩</button>
        <button class="toolbar-btn" data-action="redo" title="Redo">↪</button>
        <button class="toolbar-btn" data-action="print" title="Print">🖨</button>
        <span class="toolbar-separator"></span>
        <select title="Font" style="width: 120px;">
          <option value="Arial">Arial</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Courier New">Courier New</option>
        </select>
        <span class="toolbar-separator"></span>
        <button class="toolbar-btn" data-action="bold" title="Bold"><b>B</b></button>
        <button class="toolbar-btn" data-action="italic" title="Italic"><i>I</i></button>
        <button class="toolbar-btn" data-action="underline" title="Underline"><u>U</u></button>
        <button class="toolbar-btn" data-action="forecolor" title="Text color" style="color: #ea4335;">A</button>
        <button class="toolbar-btn" data-action="hilitecolor" title="Highlight color" style="background: #fff475; border-radius:2px;">Pen</button>
        <span class="toolbar-separator"></span>
        <button class="toolbar-btn" data-action="justifyleft" title="Align Left">⫷</button>
        <button class="toolbar-btn" data-action="justifycenter" title="Align Center">⫸</button>
        <button class="toolbar-btn" data-action="justifyright" title="Align Right">⫺</button>
      </div>
    </header>

    <div class="workspace-wrapper">
      <aside class="tabs-sidebar" id="tabs-sidebar">
        <div class="tabs-list" id="tabs-list"></div>
        <button class="add-tab-btn" id="add-tab-btn">+ Add document</button>
      </aside>

      <main class="document-canvas">
        <div class="ruler"></div>
        <div class="pages-container" id="pages-container">
          </div>
      </main>

      <aside class="comments-sidebar">
        <div class="comments-panel">
          <div class="comments-panel-header">
            <h2>Comments</h2>
          </div>
          <div class="comments-list" id="comments-sidebar-list"></div>
        </div>
      </aside>
    </div>
  </div>

  <div class="version-history-overlay" id="version-history-view" hidden style="position:fixed; inset:0; z-index:2000; background:#f8f9fa; display:flex; flex-direction:column;">
    <div style="height:64px; border-bottom:1px solid var(--border-strong); background:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 24px; flex-shrink:0;">
      <div style="display:flex; align-items:center; gap:16px;">
        <button id="vh-back-btn" style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-secondary);">←</button>
        <div>
          <div style="font-size:14px; color:var(--text-secondary);">Version history</div>
          <div id="vh-top-date-title" style="font-size:16px; font-weight:500; color:var(--text-primary);">May 15, 4:00 p.m.</div>
        </div>
      </div>
      <div>
        <button id="vh-restore-trigger-btn" style="background:#1a73e8; color:#fff; border:none; padding:8px 16px; border-radius:4px; font-weight:500; cursor:pointer;">Restore this version</button>
      </div>
    </div>

    <div style="flex:1; display:flex; flex-direction:row; overflow:hidden; width:100%;">
      <aside style="width:240px; border-right:1px solid var(--border-strong); background:#fff; display:flex; flex-direction:column; flex-shrink:0; padding:12px 0;">
        <div style="padding:0 16px 8px; font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-secondary); font-weight:600;">Tabs in this version</div>
        <div id="vh-tabs-container" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:2px; padding:0 8px;"></div>
      </aside>

      <main style="flex:1; background:#f1f3f4; display:flex; justify-content:center; overflow-y:auto; padding:24px;">
        <div id="vh-canvas" class="doc-page" style="width:816px; min-height:1056px; background:#fff; padding:96px; box-shadow:0 1px 3px rgba(60,64,67,0.15); border:1px solid var(--border-subtle); outline: none;"></div>
      </main>

      <aside style="width:280px; border-left:1px solid var(--border-strong); background:#fff; display:flex; flex-direction:column; flex-shrink:0;">
        <div style="padding:16px; border-bottom:1px solid var(--border-strong); display:flex; justify-content:space-between; align-items:center;">
          <h2 style="font-size:16px; font-weight:500; margin:0;">Version history</h2>
          <span id="vh-total-edits" style="font-size:12px; color:var(--text-secondary);">Total: 0 edits</span>
        </div>
        <div class="version-list" id="version-list" style="flex:1; overflow-y:auto; padding:8px 12px;"></div>
        <div style="padding:12px 16px; border-top:1px solid var(--border-strong); font-size:12px; color:var(--text-secondary);">
          <label><input type="checkbox" checked /> Highlight changes</label>
        </div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="confirm-modal" hidden>
    <div class="modal-card">
      <h3>Restore this version?</h3>
      <p>This will replace your current document with the selected version. Are you sure?</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel-btn" style="background:#fff; border:1px solid var(--border-strong); padding:8px 16px; border-radius:4px; cursor:pointer;">Cancel</button>
        <button class="btn-primary" id="modal-confirm-btn" style="background:#1a73e8; color:#fff; border:none; padding:8px 16px; border-radius:4px; cursor:pointer;">Restore</button>
      </div>
    </div>
  </div>

  <script src="js/history.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
