<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On the Stoics - Google Docs</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 32'><path d='M16 0H3a2 2 0 0 0-2 2v28a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8z' fill='%23267CDE'/><path d='M16 0v6a2 2 0 0 0 2 2h5z' fill='%237BAAF7'/><rect x='6' y='14' width='12' height='2' fill='%23fff'/><rect x='6' y='19' width='12' height='2' fill='%23fff'/><rect x='6' y='24' width='8' height='2' fill='%23fff'/></svg>">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/comments.css">
</head>
<body>

<div class="app-shell" id="app-shell">
  <header class="app-header">
    <div class="header-top">
      <div class="doc-icon">
        <svg width="24" height="32" viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 0H3a2 2 0 0 0-2 2v28a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8L16 0z" fill="#267CDE"/>
          <path d="M16 0v6a2 2 0 0 0 2 2h5L16 0z" fill="#7BAAF7"/>
          <rect x='5' y='14' width='14' height='2' fill='#fff'/>
          <rect x='5' y='19' width='14' height='2' fill='#fff'/>
          <rect x='5' y='24' width='9' height='2' fill='#fff'/>
        </svg>
      </div>
      <div class="title-block">
        <div class="title-row">
          <input type="text" class="doc-title" value="On the Stoics" aria-label="Document Title">
          <button class="star-btn" title="Star">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </button>
        </div>
        <div class="menubar">
          <span>File</span><span>Edit</span><span>View</span><span>Insert</span><span>Format</span><span>Tools</span><span>Extensions</span><span>Help</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="history-btn" title="Open version history">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12h-2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8c2.05 0 3.93.78 5.35 2.05L14 9h7V2l-2.67 2.67C16.65 3.02 14.46 2 11.99 2zm.01 5v5l4.28 2.54.72-1.21-3.5-2.08V7h-1.5z"/>
          </svg>
        </button>
        <button class="icon-btn" id="toolbar-comment-btn" title="Add comment">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 4H3c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h2v4l4-4h12c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 12H7.2l-2.2 2.2V16H3V6h18v10zm-14-3h12v-2H7v2zm0-3h12V8H7v2z"/>
          </svg>
        </button>
        <button class="share-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 6px;"><path d="M12 22V12M12 12l4 4M12 12l-4 4M21 12A9 9 0 1112 3a9 9 0 019 9z"/></svg>
          Share
        </button>
        <div class="anonymous-profile" title="Anonymous Workspace Viewer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2a5 5 0 1 0 5 5 5 5 0 0 0-5-5zm0 12c-4.42 0-13 2.24-13 6.67V22h26v-1.33c0-4.43-8.58-6.67-13-6.67z"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <button class="toolbar-btn" data-action="undo" title="Undo (Ctrl+Z)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>
      <button class="toolbar-btn" data-action="redo" title="Redo (Ctrl+Y)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
      </button>
      <button class="toolbar-btn" title="Print">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
      </button>
      <button class="toolbar-btn" title="Spelling and grammar check">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      </button>
      <button class="toolbar-btn" title="Paint format">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.66 5.41l.92.92-2.69 2.68-.92-.92 2.69-2.68M11 15.17l-.92-.92 2.68-2.69.92.92-2.68 2.69M20 2c-.55 0-1 .45-1 1v1.58l-2.73 2.73c-1.23-.74-2.85-.6-3.93.42L8.7 11.37l-3.32-.32c-.51-.05-1 .13-1.35.49L2.1 13.47l5.24 5.24-1.12 1.12c-.39.39-.39 1.02 0 1.41l1.41 1.41c.39.39 1.02.39 1.41 0l1.12-1.12 5.24 5.24 1.93-1.93c.36-.36.54-.84.49-1.35l-.32-3.32 3.63-3.63c1.02-1.08 1.16-2.7.42-3.93L21 6.42V3c0-.55-.45-1-1-1z"/></svg>
      </button>

      <div class="toolbar-sep"></div>

      <select class="toolbar-select" style="width: 75px;" title="Zoom">
        <option>100%</option><option>75%</option><option>90%</option><option>125%</option><option>150%</option>
      </select>

      <div class="toolbar-sep"></div>

      <select class="toolbar-select" style="width: 105px;" title="Styles">
        <option>Normal text</option><option>Heading 1</option><option>Heading 2</option><option>Heading 3</option><option>Title</option>
      </select>

      <div class="toolbar-sep"></div>

      <select class="toolbar-select" style="width: 95px;" title="Font">
        <option>Arial</option><option>Times New Roman</option><option>Courier New</option><option>Georgia</option><option>Roboto</option>
      </select>

      <div class="toolbar-sep"></div>

      <div class="size-controls">
        <button class="toolbar-btn text-size-btn" title="Decrease font size">-</button>
        <input type="text" class="font-size-input" value="11" aria-label="Font size">
        <button class="toolbar-btn text-size-btn" title="Increase font size">+</button>
      </div>

      <div class="toolbar-sep"></div>

      <button class="toolbar-btn" data-action="bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="toolbar-btn" data-action="italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="toolbar-btn" data-action="underline" title="Underline (Ctrl+U)"><u>U</u></button>
      <button class="toolbar-btn" data-action="forecolor" title="Text color"><span style="color: #ea4335; border-bottom: 2px solid #ea4335;">A</span></button>
      <button class="toolbar-btn" data-action="hilitecolor" title="Highlight color" style="background: #fef0b5;"><span style="background: #fbbc05; padding: 1px 3px; border-radius: 2px;">H</span></button>

      <div class="toolbar-sep"></div>

      <button class="toolbar-btn" title="Insert link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
      </button>
      <button class="toolbar-btn" title="Insert image">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.96-2.36L6.5 17h11l-3.54-4.71z"/></svg>
      </button>

      <div class="toolbar-sep"></div>

      <button class="toolbar-btn" data-action="justifyleft" title="Left align (Ctrl+Shift+L)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15 15H3v2h12v-2zm0-8H3v2h12V7zM3 13h18v-2H3v2zm0 8h18v-2H3v2zM3 3v2h18V3H3z"/></svg>
      </button>
      <button class="toolbar-btn" data-action="justifycenter" title="Center align (Ctrl+Shift+E)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 15h10v2H7v-2zm0-8h10v2H7V7zm-4 6h18v-2H3v2zm0 8h18v-2H3v2zM3 3v2h18V3H3z"/></svg>
      </button>
      <button class="toolbar-btn" data-action="justifyright" title="Right align (Ctrl+Shift+R)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 15h12v2H9v-2zm0-8h12v2H9V7zM3 13h18v-2H3v2zm0 8h18v-2H3v2zM3 3v2h18V3H3z"/></svg>
      </button>

      <div class="toolbar-sep"></div>

      <button class="toolbar-btn" title="Line & paragraph spacing">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h14v2H7V5zm0 14h14v-2H7v2zm0-7h14v2H7v-2zM3 4.5l4 4V11H6v4h1V15.5l-4 4v-15z"/></svg>
      </button>
      <button class="toolbar-btn" title="Checklist">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22 5.18L10.59 16.6l-4.24-4.24 1.41-1.41 2.83 2.83 10-10L22 5.18zm-2.21 7.3c.13.49.21.99.21 1.52 0 3.87-3.13 7-7 7s-7-3.13-7-7 3.13-7 7-7c1.76 0 3.37.66 4.61 1.75l1.43-1.43A8.93 8.93 0 0 0 13 3a9 9 0 1 0 9 9c0-.83-.11-1.63-.31-2.4l-1.9 1.88z"/></svg>
      </button>
      <button class="toolbar-btn" title="Numbered list">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9v-.9H2v1zm5-6h14v2H7V5zm0 7h14v2H7v-2zm0 7h14v2H7v-2z"/></svg>
      </button>
      <button class="toolbar-btn" title="Bulleted list">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zm3-11h14v2H7v-2zm0 7h14v2H7v-2zm0 7h14v2H7v-2z"/></svg>
      </button>
      <button class="toolbar-btn" title="Decrease indent">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11 17h10v-2H11v2zm-8-5l4 4V8l-4 4zm0 9h18v-2H3v2zM3 3v2h18V3H3zm8 6h10V7H11v2zm0 4h10v-2H11v2z"/></svg>
      </button>
      <button class="toolbar-btn" title="Increase indent">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 21h18v-2H3v2zM3 3v2h18V3H3zm8 14h10v-2H11v2zM7 12l-4-4v8l4-4zm4-3h10V7H11v2zm0 4h10v-2H11v2z"/></svg>
      </button>
      <button class="toolbar-btn" title="Clear formatting">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3.5 18.49l6-6.01 4 4L22 8.53l-1.41-1.41-7.09 7.09-4-4L3.5 16.23l0 2.26z"/></svg>
      </button>
    </div>
  </header>

  <div class="workspace-wrapper">
    <aside class="tabs-sidebar" id="tabs-sidebar">
      <div class="tabs-panel-title">Document Tabs</div>
      <div class="tabs-container" id="tabs-container"></div>
      <button class="add-tab-btn" id="add-tab-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Tab
      </button>
    </aside>

    <main class="doc-canvas" id="doc-canvas">
      <div class="ruler" aria-hidden="true">
        <div class="ruler-track">
          <div class="ruler-face"></div>
          <div class="ruler-margin-marker left-margin" style="left: 1in;"></div>
          <div class="ruler-margin-marker right-margin" style="right: 1in;"></div>
        </div>
      </div>
      <div id="pages-container"></div>
    </main>

    <aside class="side-panel" id="comments-sidebar">
      <div class="comments-panel">
        <div class="comments-panel-header">
          <h2>Comments</h2>
        </div>
        <div class="comments-list" id="comments-list"></div>
      </div>
    </aside>
  </div>

  <div class="version-history-view" id="version-history-view" hidden>
    <div class="vh-header">
      <button class="vh-back-btn" id="vh-back-btn" title="Close version history">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="vh-title" id="vh-title-current">Version History Preview</div>
      <button class="restore-action-btn" id="vh-restore-trigger-btn">Restore this version</button>
    </div>
    <div class="vh-subbar">
      <span>Previewing content state logs</span>
    </div>
    <div class="workspace-wrapper">
      <main class="doc-canvas vh-canvas" id="vh-canvas"></main>
      <aside class="vh-panel">
        <div class="vh-panel-header">
          <h2>Version logs</h2>
        </div>
        <div class="version-list" id="version-list"></div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="confirm-modal" hidden>
    <div class="modal-card">
      <h3>Restore this version?</h3>
      <p>Are you sure you want to restore the document to the previous version? Your current workspace state layout will be replaced.</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button class="btn-primary" id="modal-confirm-btn">Yes, Restore</button>
      </div>
    </div>
  </div>

</div>

<script src="js/editor.js"></script>
<script src="js/comments.js"></script>
<script src="js/history.js"></script>
<script src="js/app.js"></script>
</body>
</html>
