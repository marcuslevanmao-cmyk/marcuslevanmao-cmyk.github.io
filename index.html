<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Utility of Gods - Google Docs</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 32'><path d='M16 0H3a2 2 0 0 0-2 2v28a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8z' fill='%23267CDE'/><path d='M16 0v6a2 2 0 0 0 2 2h5z' fill='%237BAAF7'/><rect x='6' y='14' width='12' height='2' fill='%23fff'/><rect x='6' y='19' width='12' height='2' fill='%23fff'/><rect x='6' y='24' width='8' height='2' fill='%23fff'/></svg>\" />

  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/comments.css" />
</head>
<body>

<div class="app-shell">
  <header class="app-header">
    <div class="header-top">
      <a href="#" class="doc-icon" title="Docs Home">
        <svg width="40" height="40" viewBox="0 0 24 32">
          <path d="M16 0H3a2 2 0 0 0-2 2v28a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8z" fill="#267CDE"/>
          <path d="M16 0v6a2 2 0 0 0 2 2h5z" fill="#7BAAF7"/>
          <rect x="6" y="14" width="12" height="2" fill="#fff"/>
          <rect x="6" y="19" width="12" height="2" fill="#fff"/>
          <rect x="6" y="24" width="8" height="2" fill="#fff"/>
        </svg>
      </a>
      
      <div class="title-block">
        <div class="title-row">
          <input type="text" class="doc-title" value="The Utility of Gods" title="Rename" />
          <button class="star-btn" title="Star">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          </button>
        </div>
        
        <nav class="menu-bar">
          <button class="menu-btn">File</button>
          <button class="menu-btn">Edit</button>
          <button class="menu-btn">View</button>
          <button class="menu-btn">Insert</button>
          <button class="menu-btn">Format</button>
          <button class="menu-btn">Tools</button>
          <button class="menu-btn">Extensions</button>
          <button class="menu-btn">Help</button>
        </nav>
      </div>

      <div class="header-actions">
        <button class="action-icon-btn" id="history-btn" title="Last edit time">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
        </button>
        <button class="action-icon-btn" id="comment-btn" title="Open comment history">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
        </button>
        <button class="share-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right:8px;"><path fill="currentColor" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
          Share
        </button>
      </div>
    </div>

    <div class="editor-toolbar">
      <button class="toolbar-btn" data-action="undo" title="Undo (Ctrl+Z)"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></button>
      <button class="toolbar-btn" data-action="redo" title="Redo (Ctrl+Y)"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg></button>
      <div class="toolbar-separator"></div>
      
      <select title="Styles" class="toolbar-select" style="width: 110px;">
        <option selected>Normal text</option>
        <option>Heading 1</option>
        <option>Heading 2</option>
        <option>Heading 3</option>
      </select>
      <div class="toolbar-separator"></div>

      <select title="Font" class="toolbar-select" style="width: 120px; font-family: 'Times New Roman';">
        <option>Arial</option>
        <option>Calibri</option>
        <option>Courier New</option>
        <option selected>Times New Roman</option>
        <option>Roboto</option>
      </select>
      <div class="toolbar-separator"></div>

      <div class="font-size-controls">
        <button class="toolbar-btn" id="decrease-size-btn" title="Decrease font size">-</button>
        <input type="text" class="font-size-input" value="16" title="Font size" />
        <button class="toolbar-btn" id="increase-size-btn" title="Increase font size">+</button>
      </div>
      <div class="toolbar-separator"></div>

      <button class="toolbar-btn" data-action="bold" title="Bold (Ctrl+B)" style="font-weight:bold;">B</button>
      <button class="toolbar-btn" data-action="italic" title="Italic (Ctrl+I)" style="font-style:italic; font-family:serif;">I</button>
      <button class="toolbar-btn" data-action="underline" title="Underline (Ctrl+U)" style="text-decoration:underline;">U</button>
      <button class="toolbar-btn" data-action="forecolor" title="Text color" style="color:#ea4335;">A</button>
      <button class="toolbar-btn" data-action="hilitecolor" title="Highlight color"><mark style="background:#fff475; padding:2px 4px; border-radius:2px;">H</mark></button>
      <div class="toolbar-separator"></div>

      <button class="toolbar-btn" data-action="justifyleft" title="Left align"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M15 15H3v2h12v-2zm0-8H3v2h12V7zM3 13h18v-2H3v2zm0 8h18v-2H3v2zM3 3v2h18V3H3z"/></svg></button>
      <button class="toolbar-btn" data-action="justifycenter" title="Center align"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M7 15h10v2H7v-2zm0-8h10v2H7V7zm-4 6h18v-2H3v2zm0 8h18v-2H3v2zm0-18v2h18V3H3z"/></svg></button>
      <button class="toolbar-btn" data-action="justifyright" title="Right align"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M9 15h12v2H9v-2zm0-8h12v2H9V7zM3 13h18v-2H3v2zm0 8h18v-2H3v2zM3 3v2h18V3H3z"/></svg></button>
      <div class="toolbar-separator"></div>

      <button class="toolbar-btn" id="add-comment-btn" disabled title="Add comment (Ctrl+Alt+M)">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22 4c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4zm-2 13.17L18.83 16H4V4h16v13.17zM11 5h2v4h4v2h-4v4h-2v-4H7V9h4V5z"/></svg>
      </button>
    </div>
  </header>

  <div class="workspace-wrapper">
    <aside class="tabs-sidebar" id="tabs-sidebar">
      <div class="tabs-sidebar-header">
        <button class="add-tab-btn" id="add-tab-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" style="margin-right:8px;"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Add New Tab
        </button>
      </div>
      <div class="tabs-list" id="tabs-list"></div>
    </aside>

    <main class="editor-canvas">
      <div class="ruler">
        <div class="ruler-track">
          <div class="ruler-margin margin-left" style="left: 0; width: 96px;"></div>
          <div class="ruler-margin margin-right" style="right: 0; width: 96px;"></div>
        </div>
      </div>
      
      <div id="pages-container" class="pages-scroll-container"></div>
    </main>
  </div>
</div>

<div class="version-history-view" id="version-history-view" hidden>
  <div class="vh-shell">
    <div class="vh-header">
      <button class="vh-back-btn" id="vh-back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right:8px;"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Version History
      </button>
      <div class="vh-meta-block">
        <span class="vh-doc-name">The Utility of Gods</span>
        <span class="vh-timestamp" id="vh-current-version-title">Current Version</span>
      </div>
      <button class="btn-primary" id="vh-restore-trigger-btn" style="height:36px; border-radius:18px;">Restore this version</button>
    </div>
    
    <div class="vh-body">
      <main class="vh-canvas">
        <div class="doc-page preview-mode" id="vh-page-preview-box" style="padding:96px; min-height:1056px; box-shadow:0 1px 3px rgba(60,64,67,0.15); border:1px solid var(--border-subtle);"></div>
      </main>

      <aside style="width:280px; border-left:1px solid var(--border-strong); background:#fff; display:flex; flex-direction:column; flex-shrink:0;">
        <div style="padding:16px; border-bottom:1px solid var(--border-strong);">
          <h2 style="font-size:16px; font-weight:500; margin:0;">Version history</h2>
        </div>
        <div class="version-list" id="version-list" style="flex:1; overflow-y:auto; padding:8px 12px;"></div>
        <div style="padding:12px 16px; border-top:1px solid var(--border-strong); font-size:12px; color:var(--text-secondary);">
          <label><input type="checkbox" checked /> Highlight changes</label>
        </div>
      </aside>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirm-modal" hidden>
  <div class="modal-card">
    <h3>Restore this version?</h3>
    <p>This will replace your current document with the selected version. Are you sure?</p>
    <div class="modal-actions">
      <button class="btn-secondary" id="modal-cancel-btn">Cancel</button>
      <button class="btn-primary" id="modal-confirm-btn">Restore</button>
    </div>
  </div>
</div>

<script src="js/editor.js"></script>
<script src="js/comments.js"></script>
<script src="js/history.js"></script>
<script src="js/app.js"></script>

</body>
</html>
