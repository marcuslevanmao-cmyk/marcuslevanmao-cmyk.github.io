<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Utility of Gods - Google Docs</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 32'><path d='M16 0H3a2 2 0 0 0-2 2v28a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8z' fill='%23267CDE'/><path d='M16 0v6a2 2 0 0 0 2 2h5z' fill='%237BAAF7'/><rect x='6' y='14' width='12' height='2' fill='%23fff'/><rect x='6' y='19' width='12' height='2' fill='%23fff'/><rect x='6' y='24' width='8' height='2' fill='%23fff'/></svg>">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/comments.css">
</head>
<body>

<div class="app-shell" id="app-shell">
  <header class="app-header">
    <div class="header-top">
      <div class="doc-icon">
        <svg width="24" height="32" viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 0H3a2 2 0 0 0-2 2v28a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8L16 0z" fill="#267CDE"/>
          <path d="M16 0v6a2 2 0 0 0 2 2h5L16 0z" fill="#7BAAF7"/>
          <rect x='5' y='14' width='14' height='2' fill='#fff'/>
          <rect x='5' y='19' width='14' height='2' fill='#fff'/>
          <rect x='5' y='24' width='9' height='2' fill='#fff'/>
        </svg>
      </div>
      <div class="title-block">
        <div class="title-row">
          <input type="text" class="doc-title" value="The Utility of Gods" aria-label="Document Title">
          <button class="star-btn" title="Star">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </button>
        </div>
        <div class="menubar">
          <span>File</span><span>Edit</span><span>View</span><span>Insert</span><span>Format</span><span>Tools</span><span>Extensions</span><span>Help</span>
        </div>
      </div>
      <div class="header-actions">
        <!-- History Button -->
        <button class="icon-btn" id="history-btn" title="Open version history">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12h-2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8c2.05 0 3.93.78 5.35 2.05L14 9h7V2l-2.67 2.67C16.65 3.02 14.46 2 11.99 2zm.01 5v5l4.28 2.54.72-.72L13 11V7h-1z"/>
          </svg>
        </button>
        
        <!-- Comment History Button -->
        <button class="icon-btn" title="Open comment history">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>

        <!-- Share Button -->
        <button class="share-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
          Share
        </button>

        <!-- Anonymous Capybara Profile -->
        <div class="anonymous-profile" title="Anonymous Capybara">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
      </div>
    </div>
    
    <div class="toolbar">
      <!-- Undo / Redo -->
      <button class="toolbar-btn" data-action="undo" title="Undo (Ctrl+Z)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>
      <button class="toolbar-btn" data-action="redo" title="Redo (Ctrl+Y)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
      </button>
      
      <div class="toolbar-sep"></div>

      <!-- Styles Dropdown -->
      <select class="toolbar-select" title="Styles" aria-label="Style">
        <option value="Normal text" selected>Normal text</option>
        <option value="Heading 1">Heading 1</option>
        <option value="Heading 2">Heading 2</option>
        <option value="Heading 3">Heading 3</option>
      </select>

      <div class="toolbar-sep"></div>

      <!-- Font Dropdown -->
      <select class="toolbar-select" title="Font" aria-label="Font" style="font-family: Arial; width: 120px;">
        <option value="Arial" selected>Arial</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Georgia">Georgia</option>
      </select>

      <div class="toolbar-sep"></div>

      <!-- Font Size Controls -->
      <div class="size-controls">
        <button class="toolbar-btn text-size-btn" id="decrease-size-btn" title="Decrease font size">-</button>
        <input type="text" class="font-size-input" value="11" title="Font size" aria-label="Font size">
        <button class="toolbar-btn text-size-btn" id="increase-size-btn" title="Increase font size">+</button>
      </div>

      <div class="toolbar-sep"></div>

      <!-- Inline Formatting -->
      <button class="toolbar-btn" data-action="bold" title="Bold (Ctrl+B)" style="font-weight: bold;">B</button>
      <button class="toolbar-btn" data-action="italic" title="Italic (Ctrl+I)" style="font-style: italic;">I</button>
      <button class="toolbar-btn" data-action="underline" title="Underline (Ctrl+U)" style="text-decoration: underline;">U</button>
      <button class="toolbar-btn" data-action="forecolor" title="Text Color">
        <span style="border-bottom: 3px solid #ea4335;">A</span>
      </button>
      <button class="toolbar-btn" data-action="hilitecolor" title="Highlight Color">
        <span style="background: #fff475; padding: 0 4px; border-radius: 2px;">H</span>
      </button>
      
      <div class="toolbar-sep"></div>

      <!-- Alignment -->
      <button class="toolbar-btn" data-action="justifyleft" title="Align Left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15 15H3v2h12v-2zm0-8H3v2h12V7zM3 13h18v-2H3v2zm0 8h18v-2H3v2zM3 3v2h18V3H3z"/></svg>
      </button>
      <button class="toolbar-btn" data-action="justifycenter" title="Align Center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 21h18v-2H3v2zm4-4h10v-2H7v2zm-4-4h18v-2H3v2zm4-4h10V7H7v2zm-4-4v2h18V3H3z"/></svg>
      </button>
      <button class="toolbar-btn" data-action="justifyright" title="Align Right">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 21h18v-2H3v2zm6-4h12v-2H9v2zm-6-4h18v-2H3v2zm6-4h12V7H9v2zm-6-4v2h18V3H3z"/></svg>
      </button>
      
      <div class="toolbar-sep"></div>
      
      <!-- Comments -->
      <button class="toolbar-btn" id="toolbar-comment-btn" title="Add comment">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>
  </header>

  <div class="workspace-wrapper">
    <aside class="tabs-sidebar">
      <div class="tabs-panel-title" style="display: flex; justify-content: space-between; align-items: center;">
        <span>Document Tabs</span>
        <button class="icon-btn" id="add-tab-btn" title="Add Tab" style="width: 24px; height: 24px; padding: 0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="tabs-container" id="tabs-container"></div>
    </aside>

    <main class="doc-canvas" id="doc-canvas">
      <div class="ruler">
        <div class="ruler-track">
          <div class="ruler-face"></div>
          <div class="ruler-margin-marker" style="left: 96px;"></div>
          <div class="ruler-margin-marker" style="right: 96px;"></div>
        </div>
      </div>
      <div id="pages-container"></div>
    </main>

    <aside class="side-panel">
      <div class="comments-panel">
        <div class="comments-panel-header">
          <h2>Comments</h2>
        </div>
        <div class="comments-list" id="comments-list"></div>
      </div>
    </aside>
  </div>
</div>

<!-- REPLACEMENT VERSION HISTORY VIEW -->
<div class="version-history-view" id="version-history-view" hidden>
  <div class="app-shell">
    
    <!-- Top Toolbar -->
    <div class="vh-top-toolbar">
      <div class="vh-top-left">
        <button class="icon-btn" id="vh-back-btn" title="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="vh-current-date-title" id="vh-top-date-title">July 10, 4:01 p.m.</span>
      </div>
      <div class="vh-top-right">
        <button class="icon-btn" title="Print"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg></button>
        <span class="vh-total-edits">Total: 1 edit</span>
        <button class="icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg></button>
        <button class="icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
      </div>
    </div>

    <div class="workspace-wrapper vh-workspace">
      <!-- Left Sidebar: Document Tabs -->
      <aside class="tabs-sidebar vh-tabs-sidebar">
        <div class="tabs-panel-title">Document tabs</div>
        <div class="tabs-container" id="vh-tabs-container">
          <!-- Preview tabs injected here -->
        </div>
      </aside>

      <!-- Center: Document Canvas Preview -->
      <main class="doc-canvas vh-canvas-wrapper" id="vh-canvas-wrapper">
        <div class="vh-restore-banner">
          <button class="btn-primary" id="vh-restore-trigger-btn">Restore this version</button>
        </div>
        <div class="vh-canvas" id="vh-canvas">
          <!-- Preview content with green highlights injected here -->
        </div>
      </main>

      <!-- Right Sidebar: Version List -->
      <aside class="vh-panel right-panel">
        <div class="vh-panel-header">
          <h2>Version history</h2>
          <select class="vh-dropdown">
            <option>All versions</option>
            <option>Named versions</option>
          </select>
        </div>
        <div class="version-list" id="version-list">
          <!-- History items injected here -->
        </div>
        <div class="vh-panel-footer">
          <label><input type="checkbox" checked> Highlight changes</label>
        </div>
      </aside>
    </div>
  </div>
</div>

<script src="js/history.js"></script>
<script src="js/comments.js"></script>
<script src="js/editor.js"></script>
<script src="js/app.js"></script>
</body>
</html>
