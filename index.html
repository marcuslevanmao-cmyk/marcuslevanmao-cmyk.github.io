<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Utility of Gods</title>
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/comments.css">
</head>
<body>

<div class="app-shell" id="app-shell">

<header class="app-header">
  <div class="header-top">
    <div class="doc-icon" aria-hidden="true">
      <svg width="26" height="34" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 0H3a2 2 0 0 0-2 2v32a2 2 0 0 0 2 2h22a2 2 0 0 0 2-2V9L17 0z" fill="#4285F4"/>
        <path d="M17 0v7a2 2 0 0 0 2 2h8L17 0z" fill="#A0C3FF"/>
        <rect x="6" y="16" width="14" height="1.6" fill="#fff"/>
        <rect x="6" y="20" width="14" height="1.6" fill="#fff"/>
        <rect x="6" y="24" width="14" height="1.6" fill="#fff"/>
        <rect x="6" y="28" width="9" height="1.6" fill="#fff"/>
      </svg>
    </div>
    <div class="title-block">
      <div class="title-row">
        <input type="text" class="doc-title" value="The Utility of Gods" aria-label="Document Title">
        <button class="star-btn" title="Star document" aria-label="Star document">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</header>

<div class="workspace-wrapper">
  
  <aside class="tabs-sidebar" id="tabs-sidebar">
    <button class="tab-btn active" data-tab="essay">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      The Utility of Gods
    </button>
    <button class="tab-btn" data-tab="brainstorm">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l-7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Brainstorm
    </button>
  </aside>

  <main class="doc-canvas" id="doc-canvas"></main>
</div>

</div>

<div class="version-history-view" id="version-history-view" hidden>
  <div class="vh-header">
    <button class="vh-back-btn" id="vh-back-btn" title="Exit history track workspace">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <span class="vh-title" id="vh-title-date">Today</span>
  </div>
  <div class="vh-body">
    <div class="doc-canvas vh-canvas" id="vh-canvas"></div>
    <aside class="vh-panel">
      <div class="version-list" id="version-list"></div>
    </aside>
  </div>
</div>

<script src="js/history.js"></script>
<script src="js/comments.js"></script>
<script src="js/editor.js"></script>
<script src="js/app.js"></script>
</body>
</html>
