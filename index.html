<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On the Stoics</title>
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/comments.css">
</head>
<body>

<div class="app-shell" id="app-shell">

  <header class="app-header">
    <div class="header-top">
      <div class="doc-icon" aria-hidden="true">
        <svg width="26" height="34" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 0H3a2 2 0 0 0-2 2v32a2 2 0 0 0 2 2h22a2 2 0 0 0 2-2V9L17 0z" fill="#4285F4"/>
          <path d="M17 0v7a2 2 0 0 0 2 2h8L17 0z" fill="#A0C3FF"/>
          <rect x="6" y="16" width="14" height="1.6" fill="#fff"/>
          <rect x="6" y="20" width="14" height="1.6" fill="#fff"/>
          <rect x="6" y="24" width="14" height="1.6" fill="#fff"/>
          <rect x="6" y="28" width="9" height="1.6" fill="#fff"/>
        </svg>
      </div>
      <div class="title-block">
        <div class="title-row">
          <input type="text" class="doc-title" value="On the Stoics" aria-label="Document Title">
          <button class="star-btn" title="Star document"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></button>
        </div>
        <div class="menu-bar">
          <button type="button" class="menu-item">File</button>
          <button type="button" class="menu-item">Edit</button>
          <button type="button" class="menu-item">View</button>
          <button type="button" class="menu-item">Insert</button>
          <button type="button" class="menu-item">Format</button>
          <button type="button" class="menu-item">Tools</button>
          <button type="button" id="history-open-btn" class="menu-item">Version History</button>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <button class="toolbar-btn" data-action="undo" title="Undo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
      <button class="toolbar-btn" data-action="redo" title="Redo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg></button>
      <button class="toolbar-btn" data-action="print" title="Print"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg></button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" data-action="comment" title="Insert Comment"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
    </div>
  </header>

  <div class="workspace-wrapper">
    <aside class="tabs-sidebar" id="tabs-sidebar">
      <button class="tab-btn active" data-tab="tab1" id="tabs-back-btn">Document Overview</button>
    </aside>

    <main class="doc-canvas" id="doc-canvas"></main>

    <aside class="side-panel" id="side-panel">
      <div class="comments-panel" id="comments-panel"></div>
    </aside>
  </div>
</div>

<div class="version-history-view" id="version-history-view" hidden>
  <div class="vh-header">
    <button class="vh-back-btn" id="vh-back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <span class="vh-title" id="vh-title-date">Today</span>
  </div>
  <div class="vh-body">
    <main class="doc-canvas vh-canvas" id=\"vh-canvas\"></main>
    <aside class="vh-panel">
      <div class="version-list" id="version-list"></div>
    </aside>
  </div>
</div>

<script src="js/history.js"></script>
<script src="js/comments.js"></script>
<script src="js/editor.js"></script>
<script src="js/app.js"></script>
</body>
</html>
